name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: npm install
      
    - name: Build web app
      run: npm run build
      env:
        NODE_OPTIONS: '--max-old-space-size=4096'
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Sync Capacitor Android
      run: npx cap sync android
        
    - name: Fix Android SDK versions
      run: |
        sed -i 's/compileSdkVersion = .*/compileSdkVersion = 35/' android/variables.gradle
        sed -i 's/targetSdkVersion = .*/targetSdkVersion = 35/' android/variables.gradle
        
    - name: Generate Keystore
      run: |
        keytool -genkeypair \
          -v \
          -keystore release.keystore \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -alias easyledger \
          -storepass ${{ secrets.KEYSTORE_PASSWORD || 'easyledger123' }} \
          -keypass ${{ secrets.KEY_PASSWORD || 'easyledger123' }} \
          -dname "CN=EasyLedger, OU=Dev, O=EasyLedger, L=Beijing, ST=Beijing, C=CN"
        
    - name: Build Unsigned Release APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
        
    - name: Zipalign APK
      run: |
        BUILD_TOOLS=${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)
        ${BUILD_TOOLS}/zipalign -v 4 \
          android/app/build/outputs/apk/release/app-release-unsigned.apk \
          android/app/build/outputs/apk/release/app-release-aligned.apk
        
    - name: Sign APK with apksigner
      run: |
        BUILD_TOOLS=${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)
        ${BUILD_TOOLS}/apksigner sign \
          --ks release.keystore \
          --ks-key-alias easyledger \
          --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD || 'easyledger123' }} \
          --key-pass pass:${{ secrets.KEY_PASSWORD || 'easyledger123' }} \
          --out android/app/build/outputs/apk/release/app-release-signed.apk \
          android/app/build/outputs/apk/release/app-release-aligned.apk
        
    - name: Verify APK
      run: |
        BUILD_TOOLS=${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)
        ${BUILD_TOOLS}/apksigner verify -v \
          android/app/build/outputs/apk/release/app-release-signed.apk
        echo "APK 签名验证通过"
        ls -lh android/app/build/outputs/apk/release/app-release-signed.apk
        
    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: EasyLedger-Release-APK
        path: android/app/build/outputs/apk/release/app-release-signed.apk
        
    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: EasyLedger v${{ github.run_number }}
        body: |
          自动构建的正式版本
          
          ## 安装方法
          1. 下载 `app-release-signed.apk`
          2. 传到安卓手机安装
          3. 如果提示未知来源，请允许安装
        files: android/app/build/outputs/apk/release/app-release-signed.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
